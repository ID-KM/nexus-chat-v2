<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat v2 | محادثة فورية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ── Reset & Theme ─────────────────────────────── */
        :root {
            --primary: #00a884;
            --bg: #111b21;
            --panel: #202c33;
            --input-bg: #2a3942;
            --text: #e9edef;
            --muted: #8696a0;
            --danger: #ef5350;
            --sent-bg: #005c4b;
            --shadow: rgba(0,0,0,0.4);
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ── Name Screen ────────────────────────────────── */
        #name-screen {
            position: fixed; inset: 0;
            background: rgba(17,27,33,0.97);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #name-screen.hidden { display: none; }

        .name-card {
            background: var(--panel);
            padding: 2.5rem 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 10px 40px var(--shadow);
            width: 90%;
            max-width: 380px;
        }
        .name-card h1 { font-size: 1.5rem; margin: 1rem 0 0.3rem; }
        .name-card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
        .name-card input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius);
            border: 1px solid #333;
            background: var(--input-bg);
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .name-card input:focus { border-color: var(--primary); }
        .name-card .color-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 1rem 0;
        }
        .name-card .color-dot {
            width: 28px; height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
        }
        .name-card .color-dot.selected { border-color: #fff; transform: scale(1.15); }
        .name-card button {
            width: 100%; padding: 12px;
            border: none; border-radius: var(--radius);
            background: var(--primary); color: #fff;
            font-size: 1rem; font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .name-card button:hover { opacity: 0.9; }
        .name-card button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── App Layout ─────────────────────────────────── */
        .app {
            width: 100%; max-width: 1000px;
            height: 100vh;
            background: var(--bg);
            display: flex; flex-direction: column;
        }

        /* ── Header ─────────────────────────────────────── */
        header {
            background: var(--panel);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.9rem;
            flex-shrink: 0;
        }
        .room-info h3 { font-size: 0.95rem; }
        .room-info .online-count { font-size: 0.75rem; color: var(--muted); }
        .header-tools { display: flex; align-items: center; gap: 8px; }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
            font-size: 1.1rem;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .icon-btn.active { color: var(--primary); background: rgba(0,168,132,0.15); }

        /* ── Chat Window ────────────────────────────────── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 78%;
            position: relative;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .msg.sent { align-self: flex-end; align-items: flex-end; }
        .msg.recv { align-self: flex-start; align-items: flex-start; }
        .msg.flip-sent { align-self: flex-start; align-items: flex-start; }
        .msg.flip-recv { align-self: flex-end; align-items: flex-end; }

        .msg .sender {
            font-size: 0.72rem;
            font-weight: bold;
            margin-bottom: 2px;
            padding: 0 4px;
        }
        .msg.recv .sender { color: #53bdeb; }
        .msg.sent .sender { color: #dcf8c6; }

        .msg .bubble {
            padding: 7px 12px;
            border-radius: var(--radius);
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            position: relative;
        }
        .msg.sent .bubble { background: var(--sent-bg); border-radius: var(--radius) var(--radius) 2px var(--radius); }
        .msg.recv .bubble { background: var(--panel); border-radius: var(--radius) var(--radius) var(--radius) 2px; }
        .msg.flip-sent .bubble { background: var(--sent-bg); border-radius: var(--radius) var(--radius) var(--radius) 2px; }
        .msg.flip-recv .bubble { background: var(--panel); border-radius: var(--radius) var(--radius) 2px var(--radius); }

        .msg .bubble img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
            margin: 4px 0;
            display: block;
            cursor: pointer;
        }
        .msg .meta {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 3px;
            direction: ltr;
        }
        .msg.sent .meta { justify-content: flex-end; }
        .msg.recv .meta { justify-content: flex-start; }
        .msg .meta .del-btn {
            background: none; border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.7rem;
            opacity: 0.5;
            transition: 0.2s;
            padding: 2px;
        }
        .msg .meta .del-btn:hover { opacity: 1; transform: scale(1.15); }

        .msg .bubble a { color: #53bdeb; text-decoration: underline; }

        /* ── Typing indicator ───────────────────────────── */
        #typing-indicator {
            padding: 2px 16px 8px;
            font-size: 0.78rem;
            color: var(--muted);
            min-height: 1.2em;
            flex-shrink: 0;
        }
        #typing-indicator span { font-weight: bold; }
        .typing-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }

        /* ── Loading ────────────────────────────────────── */
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            gap: 8px;
        }
        #loading .spinner {
            width: 20px; height: 20px;
            border: 3px solid var(--panel);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ─────────────────────────────────────── */
        footer {
            background: var(--panel);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .input-wrap {
            flex: 1;
            background: var(--input-bg);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 14px;
        }
        .input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 0;
            outline: none;
            font-size: 0.95rem;
        }
        .input-wrap input::placeholder { color: var(--muted); }
        .send-btn { color: var(--primary); }

        /* ── Toast / Error ──────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; }

        /* ── Scrollbar ──────────────────────────────────── */
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: #374045; border-radius: 3px; }

        /* ── Responsive ─────────────────────────────────── */
        @media (max-width: 640px) {
            .msg { max-width: 88%; }
            .name-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<!-- ── Toast ──────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Name Screen ─────────────────────────────────── -->
<div id="name-screen">
    <div class="name-card">
        <i class="fas fa-comments" style="font-size: 2.8rem; color: var(--primary);"></i>
        <h1>Nexus Chat</h1>
        <p>محادثة فورية آمنة — اختر اسمك وانضم</p>
        <input type="text" id="nameInput" placeholder="اسمك ليظهر للآخرين" maxlength="30" autocomplete="off">
        <div class="color-grid" id="colorGrid">
            <div class="color-dot selected" data-color="#005c4b" style="background:#005c4b"></div>
            <div class="color-dot" data-color="#004b5c" style="background:#004b5c"></div>
            <div class="color-dot" data-color="#5c003a" style="background:#5c003a"></div>
            <div class="color-dot" data-color="#5c3a00" style="background:#5c3a00"></div>
            <div class="color-dot" data-color="#3a5c00" style="background:#3a5c00"></div>
            <div class="color-dot" data-color="#444444" style="background:#444"></div>
        </div>
        <button id="joinBtn">انضم إلى المحادثة</button>
    </div>
</div>

<!-- ── Chat App ────────────────────────────────────── -->
<div class="app">
    <header>
        <div class="header-left">
            <div class="avatar" id="myAvatar" style="background:var(--primary);">N</div>
            <div class="room-info">
                <h3>غرفة المحادثة</h3>
                <div class="online-count"><span id="onlineCount">0</span> متصل</div>
            </div>
        </div>
        <div class="header-tools">
            <button class="icon-btn" id="flipBtn" title="عكس اتجاه المحادثة">
                <i class="fas fa-exchange-alt"></i>
            </button>
        </div>
    </header>

    <div id="chat">
        <div id="loading">
            <div class="spinner"></div>
            جاري التحميل...
        </div>
    </div>

    <div id="typing-indicator"></div>

    <footer>
        <label for="fileInput" class="icon-btn" title="إرفاق صورة">
            <i class="fas fa-paperclip"></i>
        </label>
        <input type="file" id="fileInput" hidden accept="image/*">
        <div class="input-wrap">
            <input type="text" id="msgInput" placeholder="اكتب رسالة..." autocomplete="off">
        </div>
        <button class="icon-btn send-btn" id="sendBtn" title="إرسال">
            <i class="fas fa-paper-plane"></i>
        </button>
    </footer>
</div>

<script>
(function() {
    'use strict';

    // ── Config ────────────────────────────────────────
    const WS_URL = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host;
    const DRAFT_KEY = 'nexus_draft';
    const NAME_KEY = 'nexus_name';
    const COLOR_KEY = 'nexus_color';
    const FLIP_KEY = 'nexus_flip';
    const MAX_IMAGE_SIZE = 500_000; // 500KB

    // ── State ─────────────────────────────────────────
    let ws = null;
    let userId = null;
    let myName = '';
    let myColor = '#005c4b';
    let isFlipped = false;
    let reconnectTimer = null;
    let msgCount = 0;

    // ── DOM Refs ──────────────────────────────────────
    const $ = id => document.getElementById(id);
    const chat = $('chat');
    const msgInput = $('msgInput');
    const sendBtn = $('sendBtn');
    const nameScreen = $('name-screen');
    const nameInput = $('nameInput');
    const joinBtn = $('joinBtn');
    const typingEl = $('typing-indicator');
    const onlineCount = $('onlineCount');
    const flipBtn = $('flipBtn');
    const toast = $('toast');

    // ── Toast ─────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── Safe HTML ────────────────────────────────────
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function linkify(text) {
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return escapeHtml(text).replace(urlPattern, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    }

    // ── Connection ────────────────────────────────────
    function connect() {
        if (ws) {
            ws.onclose = null;
            ws.close();
        }

        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
            console.log('[WS] Connected');
            ws.send(JSON.stringify({ type: 'join', userName: myName, color: myColor }));
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        };

        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                handleServerMsg(data);
            } catch (err) {
                console.error('[WS] Parse error:', err);
            }
        };

        ws.onclose = () => {
            console.log('[WS] Disconnected');
            // Auto-reconnect after 2s (unless name screen is showing)
            if (!nameScreen.classList.contains('hidden')) return;
            if (!reconnectTimer) {
                reconnectTimer = setTimeout(() => {
                    reconnectTimer = null;
                    connect();
                }, 2000);
            }
        };

        ws.onerror = (err) => {
            console.error('[WS] Error:', err);
        };
    }

    function sendToServer(data) {
        if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify(data));
        }
    }

    // ── Message Handlers ──────────────────────────────
    function handleServerMsg(data) {
        switch (data.type) {
            case 'init': {
                userId = data.userId;
                chat.innerHTML = '';
                data.messages.forEach(msg => renderMessage(msg));
                scrollDown();
                loadDraft();
                break;
            }
            case 'new_message': {
                renderMessage(data.message);
                scrollDown();
                msgCount++;
                break;
            }
            case 'msg_sent': {
                // Optimistic update already done
                break;
            }
            case 'msg_deleted': {
                const el = document.querySelector(`[data-msgid="${data.messageId}"]`);
                if (el) el.remove();
                break;
            }
            case 'users': {
                onlineCount.textContent = data.users.length;
                break;
            }
            case 'typing': {
                if (data.userId === userId) break; // ignore own typing
                updateTyping(data);
                break;
            }
            case 'error': {
                showToast(data.message);
                break;
            }
            case 'pong': break;
        }
    }

    // ── Typing ────────────────────────────────────────
    let typingUsers = new Map(); // userId -> userName

    function updateTyping(data) {
        if (data.typing) {
            typingUsers.set(data.userId, data.userName);
        } else {
            typingUsers.delete(data.userId);
        }
        renderTyping();
    }

    function renderTyping() {
        const names = Array.from(typingUsers.values());
        if (names.length === 0) {
            typingEl.textContent = '';
            return;
        }
        const label = names.length === 1
            ? `<span>${escapeHtml(names[0])}</span> يكتب...`
            : names.length === 2
            ? `<span>${escapeHtml(names[0])}</span> و <span>${escapeHtml(names[1])}</span> يكتبان...`
            : `<span>${escapeHtml(names[0])}</span> و ${names.length - 1} آخرون يكتبون...`;
        typingEl.innerHTML = label;
    }

    // ── Render Message ────────────────────────────────
    function renderMessage(msg) {
        // Remove loading indicator
        const loading = document.getElementById('loading');
        if (loading) loading.remove();

        const isMe = msg.userId === userId;
        const bubbleColor = isMe ? (msg.color || myColor) : (msg.color || '#202c33');
        const align = isFlipped ? (isMe ? 'flip-sent' : 'flip-recv') : (isMe ? 'sent' : 'recv');

        const div = document.createElement('div');
        div.className = `msg ${align}`;
        div.setAttribute('data-msgid', msg.id);

        const isImage = msg.text.startsWith('data:image');
        const bubbleStyle = isMe ? '' : ` style="background:${bubbleColor}"`;

        let bodyHtml = '';
        if (isImage) {
            bodyHtml = `<img src="${escapeHtml(msg.text)}" onclick="window.open('${escapeHtml(msg.text)}')" loading="lazy">`;
        } else {
            bodyHtml = linkify(msg.text);
        }

        const time = msg.createdAt
            ? new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            : '';

        const delBtn = isMe
            ? `<button class="del-btn" data-del="${msg.id}" title="حذف"><i class="fas fa-trash"></i></button>`
            : '';

        div.innerHTML = `
            <span class="sender">${escapeHtml(msg.userName || 'مجهول')}</span>
            <div class="bubble"${bubbleStyle}>
                ${bodyHtml}
                <div class="meta">
                    <span>${time}</span>
                    ${delBtn}
                </div>
            </div>
        `;

        // Delete handler via delegation (set on chat)
        chat.appendChild(div);
    }

    // ── Scroll ────────────────────────────────────────
    function scrollDown() {
        requestAnimationFrame(() => {
            chat.scrollTop = chat.scrollHeight;
        });
    }

    // ── Send Message ──────────────────────────────────
    function sendText() {
        const text = msgInput.value.trim();
        if (!text) return;
        if (text.length > 10000) {
            showToast('الرسالة طويلة جداً (الحد الأقصى 10000 حرف)');
            return;
        }
        sendToServer({ type: 'message', text, tempId: Date.now().toString() });
        msgInput.value = '';
        saveDraft();
        sendToServer({ type: 'typing', typing: false });
    }

    function sendImage(base64) {
        if (base64.length > MAX_IMAGE_SIZE) {
            showToast('حجم الصورة كبير جداً (الحد الأقصى 500KB)');
            return;
        }
        sendToServer({ type: 'image', data: base64, tempId: Date.now().toString() });
    }

    // ── Draft Persistence ─────────────────────────────
    function saveDraft() {
        try { localStorage.setItem(DRAFT_KEY, msgInput.value); } catch {}
    }
    function loadDraft() {
        try {
            const draft = localStorage.getItem(DRAFT_KEY);
            if (draft) msgInput.value = draft;
        } catch {}
    }
    // Auto-save draft on input
    msgInput.addEventListener('input', saveDraft);

    // ── Typing Indicator (send) ───────────────────────
    let typingTimeout = null;
    msgInput.addEventListener('input', () => {
        sendToServer({ type: 'typing', typing: true });
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            sendToServer({ type: 'typing', typing: false });
        }, 2000);
    });

    // ── Events: Keyboard ──────────────────────────────
    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendText();
        }
    });

    sendBtn.addEventListener('click', sendText);

    // ── Events: Image Paste ───────────────────────────
    document.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                const file = item.getAsFile();
                if (!file) continue;
                const reader = new FileReader();
                reader.onload = (ev) => sendImage(ev.target.result);
                reader.readAsDataURL(file);
            }
        }
    });

    // ── Events: Image Upload ──────────────────────────
    $('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => sendImage(ev.target.result);
        reader.readAsDataURL(file);
        e.target.value = '';
    });

    // ── Events: Delete (delegation) ───────────────────
    // Since we're using innerHTML, we use delegation on the chat container
    chat.addEventListener('click', (e) => {
        const delBtn = e.target.closest('.del-btn');
        if (!delBtn) return;
        const msgId = delBtn.getAttribute('data-del');
        if (confirm('هل تريد حذف هذه الرسالة؟')) {
            sendToServer({ type: 'delete', messageId: msgId });
        }
    });

    // ── Events: Image Click (open) ────────────────────
    chat.addEventListener('click', (e) => {
        const img = e.target.closest('.bubble img');
        if (img && img.src.startsWith('data:image')) {
            window.open(img.src);
        }
    });

    // ── Flip Layout ───────────────────────────────────
    flipBtn.addEventListener('click', () => {
        isFlipped = !isFlipped;
        flipBtn.classList.toggle('active', isFlipped);
        localStorage.setItem(FLIP_KEY, isFlipped ? '1' : '0');
        // Re-render all messages with new alignment
        const msgs = chat.querySelectorAll('.msg');
        msgs.forEach(el => {
            const isMe = el.classList.contains('sent') || el.classList.contains('flip-sent');
            const wasRecv = el.classList.contains('recv') || el.classList.contains('flip-recv');
            el.classList.remove('sent', 'recv', 'flip-sent', 'flip-recv');
            if (isFlipped) {
                el.classList.add(isMe ? 'flip-sent' : 'flip-recv');
            } else {
                el.classList.add(isMe ? 'sent' : 'recv');
            }
        });
    });

    // Restore flip state
    if (localStorage.getItem(FLIP_KEY) === '1') {
        isFlipped = true;
        flipBtn.classList.add('active');
    }

    // ── Name Screen ───────────────────────────────────
    // Restore saved name
    const savedName = localStorage.getItem(NAME_KEY);
    if (savedName) nameInput.value = savedName;
    const savedColor = localStorage.getItem(COLOR_KEY);
    if (savedColor) {
        myColor = savedColor;
        document.querySelectorAll('.color-dot').forEach(el => {
            el.classList.toggle('selected', el.getAttribute('data-color') === savedColor);
        });
    }

    // Color picker
    document.querySelectorAll('.color-dot').forEach(el => {
        el.addEventListener('click', () => {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            myColor = el.getAttribute('data-color');
        });
    });

    // Join button
    joinBtn.addEventListener('click', () => {
        const name = nameInput.value.trim();
        if (!name) {
            showToast('يرجى إدخال اسمك أولاً');
            return;
        }
        myName = name;
        myColor = document.querySelector('.color-dot.selected').getAttribute('data-color');
        localStorage.setItem(NAME_KEY, myName);
        localStorage.setItem(COLOR_KEY, myColor);
        nameScreen.classList.add('hidden');
        // Update avatar
        document.getElementById('myAvatar').textContent = myName.charAt(0).toUpperCase();
        document.getElementById('myAvatar').style.background = myColor;
        // Connect
        connect();
    });

    // Enter key on name input
    nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') joinBtn.click();
    });

    // ── Heartbeat (every 25s) ─────────────────────────
    setInterval(() => {
        sendToServer({ type: 'ping' });
    }, 25_000);

    // ── Visibility: mark typing stopped on blur ──────
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            sendToServer({ type: 'typing', typing: false });
        }
    });

    window.addEventListener('beforeunload', () => {
        sendToServer({ type: 'typing', typing: false });
    });

    // ── Scroll when new message while at bottom ───────
    let isAtBottom = true;
    chat.addEventListener('scroll', () => {
        const threshold = 50;
        isAtBottom = (chat.scrollHeight - chat.scrollTop - chat.clientHeight) < threshold;
    });

    // ── Override renderMessage to auto-scroll only if at bottom ──
    // We already call scrollDown() after new_message, keep as-is for simplicity

})();
</script>
</body>
</html>
