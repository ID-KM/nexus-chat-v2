<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat v2 | Supabase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <style>
        /* ── Reset & Theme ─────────────────────────────── */
        :root {
            --primary: #00a884;
            --bg: #111b21;
            --panel: #202c33;
            --input: #2a3942;
            --text: #e9edef;
            --muted: #8696a0;
            --danger: #ef5350;
            --sent: #005c4b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
            background:var(--bg); color:var(--text);
            height:100vh; display:flex; justify-content:center;
            align-items:center; overflow:hidden;
        }

        /* ── Name Screen ─────────────── */
        #screen {
            position:fixed;inset:0;
            background:rgba(17,27,33,0.97);
            backdrop-filter:blur(12px);z-index:9999;
            display:flex;align-items:center;justify-content:center;
        }
        #screen.hide { display:none; }
        .card {
            background:var(--panel);padding:2.5rem 2rem;
            border-radius:1rem;text-align:center;
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
            width:90%;max-width:380px;
        }
        .card h1 { font-size:1.5rem; margin:1rem 0 0.3rem; }
        .card p { color:var(--muted); font-size:0.85rem; margin-bottom:1.5rem; }
        .card input {
            width:100%;padding:12px 16px;border-radius:8px;
            border:1px solid #333;background:var(--input);
            color:#fff;font-size:1rem;text-align:center;
            outline:none;transition:border-color .2s;
        }
        .card input:focus { border-color:var(--primary); }
        .card .colors {
            display:flex;justify-content:center;gap:10px;
            margin:1rem 0;
        }
        .card .dot {
            width:28px;height:28px;border-radius:50%;
            cursor:pointer;border:3px solid transparent;transition:.2s;
        }
        .card .dot.ok { border-color:#fff; transform:scale(1.15); }
        .card button {
            width:100%;padding:12px;border:none;border-radius:8px;
            background:var(--primary);color:#fff;font-size:1rem;
            font-weight:bold;cursor:pointer;transition:opacity .2s;
        }
        .card button:disabled { opacity:.5; cursor:not-allowed; }
        .card .step { font-size:.8rem; color:var(--muted); margin:.8rem 0; }

        /* ── App ─────────────────────── */
        .app {
            width:100%;max-width:1000px;height:100vh;
            background:var(--bg);display:flex;flex-direction:column;
        }
        header {
            background:var(--panel);padding:10px 16px;
            display:flex;align-items:center;justify-content:space-between;
            border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;
        }
        .hl { display:flex;align-items:center;gap:12px; }
        .av {
            width:40px;height:40px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-weight:bold;font-size:.9rem;flex-shrink:0;
        }
        .ri h3 { font-size:.95rem; }
        .ri small { font-size:.75rem; color:var(--muted); }
        .ht { display:flex;align-items:center;gap:8px; }
        .ib {
            background:transparent;border:none;color:var(--muted);
            width:36px;height:36px;border-radius:50%;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:.2s;font-size:1.1rem;
        }
        .ib:hover { background:rgba(255,255,255,.08); color:var(--text); }
        .ib.on { color:var(--primary); background:rgba(0,168,132,.15); }

        /* ── Chat ────────────────────── */
        #chat {
            flex:1;overflow-y:auto;padding:16px;
            background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode:overlay;background-color:var(--bg);
            display:flex;flex-direction:column;gap:8px;
            scroll-behavior:smooth;
        }

        .msg { display:flex; flex-direction:column; max-width:78%; animation:in .25s ease; }
        @keyframes in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .msg.se { align-self:flex-end; align-items:flex-end; }
        .msg.re { align-self:flex-start; align-items:flex-start; }
        .msg.fs { align-self:flex-start; align-items:flex-start; }
        .msg.fr { align-self:flex-end; align-items:flex-end; }

        .msg .nm { font-size:.72rem; font-weight:bold; margin-bottom:2px; padding:0 4px; }
        .msg.re .nm { color:#53bdeb; }
        .msg.se .nm { color:#dcf8c6; }

        .msg .bb {
            padding:7px 12px;border-radius:8px;font-size:.95rem;
            line-height:1.5;word-break:break-word;
            box-shadow:0 1px 2px rgba(0,0,0,.2);position:relative;
        }
        .msg.se .bb { background:var(--sent); border-radius:8px 8px 2px 8px; }
        .msg.re .bb { background:var(--panel); border-radius:8px 8px 8px 2px; }
        .msg.fs .bb { background:var(--sent); border-radius:8px 8px 8px 2px; }
        .msg.fr .bb { background:var(--panel); border-radius:8px 8px 2px 8px; }

        .msg .bb img { max-width:100%; max-height:300px; border-radius:4px; margin:4px 0; display:block; cursor:pointer; }
        .msg .mt {
            font-size:.6rem; color:rgba(255,255,255,.5);
            display:flex; align-items:center; gap:8px; margin-top:3px; direction:ltr;
        }
        .msg .mt .db {
            background:none;border:none;color:var(--danger);cursor:pointer;
            font-size:.7rem;opacity:.5;transition:.2s;padding:2px;
        }
        .msg .mt .db:hover { opacity:1; transform:scale(1.15); }
        .msg .bb a { color:#53bdeb; text-decoration:underline; }

        #typing { padding:2px 16px 8px; font-size:.78rem; color:var(--muted); min-height:1.2em; flex-shrink:0; }
        #loading { display:flex; align-items:center; justify-content:center; height:100%; color:var(--muted); gap:8px; }
        .spinner { width:20px; height:20px; border:3px solid var(--panel); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        footer {
            background:var(--panel);padding:8px 12px;
            display:flex;align-items:center;gap:8px;flex-shrink:0;
        }
        .iw {
            flex:1;background:var(--input);border-radius:24px;
            display:flex;align-items:center;padding:0 14px;
        }
        .iw input {
            flex:1;background:transparent;border:none;color:#fff;
            padding:10px 0;outline:none;font-size:.95rem;
        }
        .iw input::placeholder { color:var(--muted); }
        .sb { color:var(--primary); }

        #toast {
            position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
            background:var(--danger);color:#fff;padding:10px 20px;
            border-radius:20px;font-size:.85rem;z-index:999;
            opacity:0;transition:opacity .3s;pointer-events:none;
        }
        #toast.shw { opacity:1; }
        #chat::-webkit-scrollbar { width:5px; }
        #chat::-webkit-scrollbar-track { background:transparent; }
        #chat::-webkit-scrollbar-thumb { background:#374045; border-radius:3px; }
        @media (max-width:640px) { .msg { max-width:88%; } .card { padding:1.5rem; } }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- ── Name Screen ─────────────────── -->
<div id="screen">
    <div class="card">
        <i class="fas fa-comments" style="font-size:2.8rem;color:var(--primary)"></i>
        <h1>Nexus Chat</h1>
        <p>محادثة فورية — يعمل على Supabase + GitHub Pages</p>
        <input type="text" id="ni" placeholder="اسمك ليظهر للآخرين" maxlength="30" autocomplete="off">
        <div class="colors" id="cg">
            <div class="dot ok" data-c="#005c4b" style="background:#005c4b"></div>
            <div class="dot" data-c="#004b5c" style="background:#004b5c"></div>
            <div class="dot" data-c="#5c003a" style="background:#5c003a"></div>
            <div class="dot" data-c="#5c3a00" style="background:#5c3a00"></div>
            <div class="dot" data-c="#3a5c00" style="background:#3a5c00"></div>
            <div class="dot" data-c="#444" style="background:#444"></div>
        </div>
        <button id="jb">انضم إلى المحادثة</button>
        <div class="step" id="sBar">⚠️ يلزم إعداد Supabase — انظر README</div>
    </div>
</div>

<!-- ── App ──────────────────────────── -->
<div class="app">
    <header>
        <div class="hl">
            <div class="av" id="myAv" style="background:var(--primary)">N</div>
            <div class="ri">
                <h3>غرفة المحادثة</h3>
                <small id="sBar2">Supabase</small>
            </div>
        </div>
        <div class="ht">
            <button class="ib" id="fb" title="عكس"><i class="fas fa-exchange-alt"></i></button>
        </div>
    </header>
    <div id="chat"><div id="loading"><div class="spinner"></div>جاري التحميل...</div></div>
    <div id="typing"></div>
    <footer>
        <label for="fi" class="ib" title="صورة"><i class="fas fa-paperclip"></i></label>
        <input type="file" id="fi" hidden accept="image/*">
        <div class="iw"><input type="text" id="mi" placeholder="اكتب رسالة..." autocomplete="off"></div>
        <button class="ib sb" id="snd"><i class="fas fa-paper-plane"></i></button>
    </footer>
</div>

<script>
(function() {
    'use strict';

    // ══════════════════════════════════════════════════════════
    // 🛑 1. ضع هنا بيانات مشروع Supabase الخاص بك
    // ══════════════════════════════════════════════════════════
    const SUPABASE_URL = '';
    const SUPABASE_ANON_KEY = '';

    // ══════════════════════════════════════════════════════════
    // 🛑 2. اذهب إلى Supabase Dashboard → Settings → API
    // ══════════════════════════════════════════════════════════
    //    انسخ Project URL و anon/public key هنا

    // ── Config ────────────────────────
    const USER_ID_KEY = 'nxc_uid';
    const NAME_KEY = 'nxc_name';
    const COLOR_KEY = 'nxc_color';
    const FLIP_KEY = 'nxc_flip';
    const DRAFT_KEY = 'nxc_draft';
    const MAX_IMG = 500_000;

    // ── State ─────────────────────────
    let sb = null;
    let userId = null;
    let myName = '';
    let myColor = '#005c4b';
    let isFlipped = false;
    let subChannel = null;

    // ── DOM ───────────────────────────
    const $ = id => document.getElementById(id);
    const chat = $('chat');
    const mi = $('mi');
    const snd = $('snd');
    const scr = $('screen');
    const ni = $('ni');
    const jb = $('jb');
    const ty = $('typing');
    const fb = $('fb');
    const ts = $('toast');
    const sBar = $('sBar');
    const sBar2 = $('sBar2');

    // ── Toast ──────────────────────────
    let tt = null;
    function toast(msg) { ts.textContent = msg; ts.classList.add('shw'); if(tt) clearTimeout(tt); tt=setTimeout(()=>ts.classList.remove('shw'),3000); }

    // ── Safe HTML ─────────────────────
    function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function linkify(t) { return esc(t).replace(/(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig,'<a href="$1" target="_blank" rel="noopener">$1</a>'); }

    // ── Supabase Init ─────────────────
    let isConnected = false;

    function initSupabase() {
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            sBar.textContent = '⚠️ يرجى إعداد SUPABASE_URL و SUPABASE_ANON_KEY في الكود';
            sBar2.textContent = '⚠️ غير مهيأ';
            return false;
        }
        try {
            sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                realtime: { heartbeatIntervalMs: 10000 }
            });
            sBar.textContent = '✅ Supabase متصل';
            sBar2.textContent = 'Supabase متصل';
            isConnected = true;
            return true;
        } catch(e) {
            sBar.textContent = '⚠️ فشل الاتصال: ' + e.message;
            sBar2.textContent = '⚠️ خطأ';
            return false;
        }
    }

    // ── Load Messages ─────────────────
    async function loadMessages() {
        try {
            const { data, error } = await sb
                .from('messages')
                .select('*')
                .eq('deleted', false)
                .order('created_at', { ascending: true })
                .limit(50);

            if (error) throw error;

            const ld = $('loading');
            if (ld) ld.remove();

            if (data) {
                data.forEach(msg => renderMessage(msg));
                scrollDown();
            }
        } catch(e) {
            console.error('Load error:', e);
            toast('فشل تحميل الرسائل: ' + e.message);
        }
    }

    // ── Real-time Subscription ────────
    function subscribeRealtime() {
        if (subChannel) {
            sb.removeChannel(subChannel);
        }

        subChannel = sb.channel('messages-realtime')
            .on('postgres_changes',
                { event: '*', schema: 'public', table: 'messages' },
                (payload) => {
                    handleRealtime(payload);
                }
            )
            .subscribe((status) => {
                console.log('Realtime status:', status);
            });
    }

    function handleRealtime(payload) {
        const { eventType, new: newRec, old: oldRec } = payload;

        switch (eventType) {
            case 'INSERT': {
                // Remove loading
                const ld = $('loading');
                if (ld) ld.remove();
                // Don't re-render if it's our own message (already shown optimistically)
                if (newRec.user_id !== userId) {
                    renderMessage(newRec);
                    scrollDown();
                }
                break;
            }
            case 'UPDATE': {
                if (newRec.deleted) {
                    const el = document.querySelector(`[data-id="${newRec.id}"]`);
                    if (el) el.remove();
                }
                break;
            }
            case 'DELETE': {
                const el = document.querySelector(`[data-id="${oldRec.id}"]`);
                if (el) el.remove();
                break;
            }
        }
    }

    // ── Render Message ────────────────
    function renderMessage(msg) {
        const isMe = msg.user_id === userId;
        const bc = isMe ? (msg.color || myColor) : (msg.color || '#202c33');
        const align = isFlipped
            ? (isMe ? 'fs' : 'fr')
            : (isMe ? 'se' : 're');

        const div = document.createElement('div');
        div.className = `msg ${align}`;
        div.setAttribute('data-id', msg.id);

        const isImg = msg.text && msg.text.startsWith('data:image');
        const bstyle = !isMe ? ` style="background:${bc}"` : '';

        let body = '';
        if (isImg) {
            body = `<img src="${esc(msg.text)}" onclick="window.open('${esc(msg.text)}')" loading="lazy">`;
        } else {
            body = linkify(msg.text || '');
        }

        const time = msg.created_at
            ? new Date(msg.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
            : '';

        const del = isMe
            ? `<button class="db" data-del="${msg.id}" title="حذف"><i class="fas fa-trash"></i></button>`
            : '';

        div.innerHTML = `
            <span class="nm">${esc(msg.user_name || 'مجهول')}</span>
            <div class="bb"${bstyle}>
                ${body}
                <div class="mt"><span>${time}</span>${del}</div>
            </div>`;
        chat.appendChild(div);
    }

    function scrollDown() {
        requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
    }

    // ── Send ──────────────────────────
    async function sendText() {
        const text = mi.value.trim();
        if (!text) return;
        if (text.length > 10000) { toast('الرسالة طويلة جداً'); return; }

        const msg = {
            text,
            user_id: userId,
            user_name: myName,
            color: myColor,
            created_at: Date.now(),
            deleted: false
        };

        // Optimistic render
        renderMessage(msg);
        scrollDown();
        mi.value = '';
        saveDraft();

        try {
            const { error } = await sb.from('messages').insert(msg);
            if (error) throw error;
        } catch(e) {
            toast('فشل الإرسال: ' + e.message);
        }
    }

    async function sendImage(base64) {
        if (base64.length > MAX_IMG) { toast('حجم الصورة كبير جداً (500KB كحد أقصى)'); return; }

        const msg = {
            text: base64,
            user_id: userId,
            user_name: myName,
            color: myColor,
            created_at: Date.now(),
            deleted: false
        };

        renderMessage(msg);
        scrollDown();

        try {
            const { error } = await sb.from('messages').insert(msg);
            if (error) throw error;
        } catch(e) {
            toast('فشل إرسال الصورة: ' + e.message);
        }
    }

    async function deleteMsg(id) {
        if (!confirm('هل تريد حذف هذه الرسالة؟')) return;
        try {
            const { error } = await sb
                .from('messages')
                .update({ deleted: true })
                .eq('id', id)
                .eq('user_id', userId);
            if (error) throw error;
            // Remove from view (will also come via realtime)
            const el = document.querySelector(`[data-id="${id}"]`);
            if (el) el.remove();
        } catch(e) {
            toast('فشل الحذف: ' + e.message);
        }
    }

    // ── Draft ─────────────────────────
    function saveDraft() { try { localStorage.setItem(DRAFT_KEY, mi.value); } catch {} }
    function loadDraft() { try { const d=localStorage.getItem(DRAFT_KEY); if(d) mi.value=d; } catch {} }
    mi.addEventListener('input', saveDraft);

    // ── Events ────────────────────────
    mi.addEventListener('keydown', (e) => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendText(); } });
    snd.addEventListener('click', sendText);

    document.addEventListener('paste', (e) => {
        for (const item of e.clipboardData.items) {
            if (item.type.startsWith('image/')) {
                const f = item.getAsFile(); if (!f) continue;
                const r = new FileReader();
                r.onload = (ev) => sendImage(ev.target.result);
                r.readAsDataURL(f);
            }
        }
    });

    $('fi').addEventListener('change', (e) => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => sendImage(ev.target.result);
        r.readAsDataURL(f); e.target.value = '';
    });

    // Delete delegation
    chat.addEventListener('click', (e) => {
        const btn = e.target.closest('.db');
        if (btn) deleteMsg(btn.getAttribute('data-del'));
    });

    // Image click
    chat.addEventListener('click', (e) => {
        const img = e.target.closest('.bb img');
        if (img && img.src.startsWith('data:image')) window.open(img.src);
    });

    // Flip
    fb.addEventListener('click', () => {
        isFlipped = !isFlipped;
        fb.classList.toggle('on', isFlipped);
        localStorage.setItem(FLIP_KEY, isFlipped ? '1' : '0');
        document.querySelectorAll('.msg').forEach(el => {
            const isMe = el.classList.contains('se') || el.classList.contains('fs');
            el.classList.remove('se','re','fs','fr');
            el.classList.add(isFlipped ? (isMe?'fs':'fr') : (isMe?'se':'re'));
        });
    });
    if (localStorage.getItem(FLIP_KEY)==='1') { isFlipped=true; fb.classList.add('on'); }

    // ── Name Screen ───────────────────
    const savedName = localStorage.getItem(NAME_KEY);
    if (savedName) ni.value = savedName;
    const savedColor = localStorage.getItem(COLOR_KEY);
    if (savedColor) {
        myColor = savedColor;
        document.querySelectorAll('.dot').forEach(el => {
            el.classList.toggle('ok', el.getAttribute('data-c') === savedColor);
        });
    }

    document.querySelectorAll('.dot').forEach(el => {
        el.addEventListener('click', () => {
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('ok'));
            el.classList.add('ok');
            myColor = el.getAttribute('data-c');
        });
    });

    jb.addEventListener('click', async () => {
        const name = ni.value.trim();
        if (!name) { toast('يرجى إدخال اسمك'); return; }

        if (!initSupabase()) return;

        myName = name;
        myColor = document.querySelector('.dot.ok').getAttribute('data-c');
        localStorage.setItem(NAME_KEY, myName);
        localStorage.setItem(COLOR_KEY, myColor);

        // User ID
        userId = localStorage.getItem(USER_ID_KEY);
        if (!userId) {
            userId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2,15);
            localStorage.setItem(USER_ID_KEY, userId);
        }

        scr.classList.add('hide');
        $('myAv').textContent = myName.charAt(0).toUpperCase();
        $('myAv').style.background = myColor;

        await loadMessages();
        subscribeRealtime();
        loadDraft();
    });

    ni.addEventListener('keydown', (e) => { if (e.key==='Enter') jb.click(); });

})();
</script>
</body>
</html>
